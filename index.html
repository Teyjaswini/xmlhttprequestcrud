<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD USING XMLHttp Request</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
</head>

<body>

    <style>
        body {
            background-color: #ededed;
        }

        .spinner {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: rgba(255, 255, 255, .7);
            left: 0;
            top: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>


    <div class="container mt-5">
        <div class="row">
            <div class="col-md-6 offset-md-3 mb-4">
                <div class="card">
                    <div class="card-body">
                        <form id="postForm">
                            <div class="form-group">
                                <label for="title">Title</label>
                                <input type="text" class="form-control" id="title" required>
                            </div>

                            <div class="form-group">
                                <label for="body">Content</label>
                                <textarea rows="4" class="form-control" id="body" required></textarea>
                            </div>

                            <div class="form-group">
                                <label for="userId">User Id</label>
                                <select class="form-control" id="userId" required>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10">10</option>
                                </select>
                            </div>

                            <button class="btn btn-sm btn-block btn-outline-primary" id="addPostBtn">Add Post</button>
                            <button class="btn btn-sm btn-block btn-outline-primary d-none" id="updatePostBtn">Update Post</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="row" id="postContainer">
            <div class="col-md-4" id="123">
                <div class="card">
                    <div class="card-header">
                        <h3>
                            Title
                        </h3>
                    </div>

                    <div class="card-body">
                        <p class="m-0">
                            Lorem ipsum, dolor sit amet consectetur adipisicing elit. Delectus fugiat laborum autem!
                            Nulla sed praesentium temporibus eveniet esse in minima aperiam placeat, odio, enim hic
                            atque expedita reiciendis, qui ipsa.
                        </p>
                    </div>

                    <div class="card-footer d-flex justify-content-between">
                        <button class="btn btn-sm btn-outline-primary">Edit</button>
                        <button class="btn btn-sm btn-outline-danger">Remove</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="spinner d-none" id="spinner">
        <div class="spinner-border" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="./assets/js/app.js"></script>
</body>

</html>
